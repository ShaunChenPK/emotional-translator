<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotional Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="grain-overlay"></div>

  <div class="app-shell">

    <!-- LEFT PANEL -->
    <aside class="left-panel">
      <header class="brand">
        <div class="brand-mark">ET</div>
        <div class="brand-text">
          <h1>Emotional Translator</h1>
          <p>speech → feeling → form</p>
        </div>
      </header>

      <div class="mic-section">
        <button id="micBtn" class="mic-btn" aria-label="Start recording">
          <span class="mic-icon-wrap">
            <svg class="mic-icon" viewBox="0 0 24 24" fill="none">
              <rect x="9" y="2" width="6" height="11" rx="3" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5 10a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="12" y1="17" x2="12" y2="21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span class="pulse-ring"></span>
            <span class="pulse-ring ring-2"></span>
          </span>
        </button>
        <div class="mic-label" id="micLabel">Click to begin</div>
        <div class="status-dot-row">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-text" id="statusText">Idle</span>
        </div>
      </div>

      <div class="metrics-panel" id="metricsPanel">
        <div class="panel-label">Emotional State</div>

        <div class="dominant-emotion" id="dominantEmotion">—</div>

        <div class="secondary-emotions" id="secondaryEmotions"></div>

        <div class="metric-bars">
          <div class="metric-row">
            <span class="metric-name">Valence</span>
            <div class="bar-track valence-track">
              <div class="bar-fill valence-fill" id="valenceFill"></div>
              <div class="bar-center-line"></div>
            </div>
            <span class="metric-val" id="valenceVal">0</span>
          </div>
          <div class="metric-row">
            <span class="metric-name">Arousal</span>
            <div class="bar-track">
              <div class="bar-fill arousal-fill" id="arousalFill"></div>
            </div>
            <span class="metric-val" id="arousalVal">0</span>
          </div>
          <div class="metric-row">
            <span class="metric-name">Intensity</span>
            <div class="bar-track">
              <div class="bar-fill intensity-fill" id="intensityFill"></div>
            </div>
            <span class="metric-val" id="intensityVal">0</span>
          </div>
        </div>

        <div class="vocal-grid">
          <div class="vocal-chip"><span class="vocal-key">Pace</span><span class="vocal-val" id="vPace">—</span></div>
          <div class="vocal-chip"><span class="vocal-key">Hesitation</span><span class="vocal-val" id="vHesitation">—</span></div>
          <div class="vocal-chip"><span class="vocal-key">Pitch</span><span class="vocal-val" id="vPitch">—</span></div>
          <div class="vocal-chip"><span class="vocal-key">Tension</span><span class="vocal-val" id="vTension">—</span></div>
        </div>

        <div class="visual-keywords" id="visualKeywords"></div>
      </div>

      <div class="history-panel">
        <div class="panel-label">History</div>
        <div class="history-strip" id="historyStrip">
          <div class="history-empty">No readings yet</div>
        </div>
      </div>

    </aside>

    <!-- CANVAS AREA -->
    <main class="canvas-area">
      <div id="p5-canvas-container"></div>
      <div class="transcript-area" id="transcriptArea">
        <div class="transcript-inner" id="transcriptInner">
          <span class="transcript-placeholder">Your words will appear here…</span>
        </div>
      </div>
    </main>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="sketch.js"></script>
  <script src="app.js"></script>
</body>
</html>
